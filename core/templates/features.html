{% load static %}
<section id="features" class="section-padding">
    <div class="container">
      <div class="section-header text-center">
        <h2 class="section-title wow fadeInDown" data-wow-delay="0.3s">Características</h2>
        <div class="shape wow fadeInDown" data-wow-delay="0.3s"></div>
      </div>
      <div class="row">

        <div class="col-lg-4 col-md-12 col-sm-12 col-xs-12">
          <div class="content-left">
            {% for c in caracteristicas|slice:":3" %}
            <div class="box-item wow fadeInLeft" data-wow-delay="0.{% widthratio forloop.counter 1 3 %}s">
              <span class="icon">
                <i class="{{ c.icone }}"></i>
              </span>
              <div class="text">
                <h4>{{ c.nome }}</h4>
                <p>{{ c.descricao }}</p>
              </div>
            </div>
            {% endfor %}
          </div>
        </div>

        <div class="col-lg-4 col-md-12 col-sm-12 col-xs-12">
          <div class="show-box wow fadeInUp" data-wow-delay="0.3s">
            <img src="{% static 'img/feature/intro-mobile.png' %}" alt="App Intro">
          </div>
        </div>

        <div class="col-lg-4 col-md-12 col-sm-12 col-xs-12">
          <div class="content-right">
            {% for c in caracteristicas|slice:"3:6" %}
            <div class="box-item wow fadeInRight" data-wow-delay="0.{% widthratio forloop.counter 1 3 %}s">
              <span class="icon">
                <i class="{{ c.icone }}"></i>
              </span>
              <div class="text">
                <h4>{{ c.nome }}</h4>
                <p>{{ c.descricao }}</p>
              </div>
            </div>
            {% endfor %}
          </div>
        </div>

      </div>
    </div>
</section>
